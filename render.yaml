services:
  - type: web
    name: fx4fun-btc-signal
    runtime: python
    pythonVersion: "3.12.0"
    buildCommand: pip install -r requirements.txt && python -m textblob.download_corpora lite
    startCommand: gunicorn -w 2 --threads 4 --bind 0.0.0.0:$PORT --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NEWS_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
